name: packetclash-lab

services:
  postgres-db:
    image: postgres:15-alpine
    command: postgres -c max_connections=500
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bank_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "5000:5000"
      - "5002:5002"
      - "5003:5003"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - bank-target
      - bank-node-target

  bank-target:
    build: ./bank
    container_name: bank-target
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - DB_URL=postgresql://admin:password@postgres-db:5432/bank_db
      - PYTHONUNBUFFERED=1
    volumes:
      - ./certs:/certs:ro
    expose:
      - "5000"

  bank-node-target:
    build: ./bank-node
    container_name: bank-node-target
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - DB_URL=postgresql://admin:password@postgres-db:5432/bank_db
      - PORT=5003
      - NODE_ENV=production
      - WORKERS=1
    expose:
      - "5003"

  redis-db:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  bank-memory:
    build: ./bank-memory
    container_name: bank-memory
    expose:
      - "5002"
    depends_on:
      - redis-db
    environment:
      - REDIS_HOST=redis-db
      - PYTHONUNBUFFERED=1
    restart: always
